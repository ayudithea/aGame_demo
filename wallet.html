<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wallet - Legends Portal</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0b1220;
    color:#fff;
}

.container{
    max-width:520px;
    margin:auto;
    padding:15px;
}

.card{
    background:#182235;
    border-radius:15px;
    padding:15px;
    margin-bottom:15px;
}

h2{
    text-align:center;
    margin-bottom:15px;
}

.saldo{
    text-align:center;
}

.saldo small{
    color:#bbb;
    display:block;
    margin-bottom:8px;
}

.saldo h1{
    color:#ffd54a;
    font-size:38px;
}

.tabs{
    display:flex;
    gap:10px;
    margin-bottom:15px;
}

.tabs button{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#2c3e50;
    color:#fff;
    font-weight:bold;
}

.tabs button.active{
    background:#ffd54a;
    color:#000;
}

.hidden{
    display:none;
}

label{
    display:block;
    margin-top:10px;
    margin-bottom:5px;
    font-size:14px;
}

select,
input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    margin-bottom:12px;
}

.btn{
    width:100%;
    padding:13px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:#fff;
    cursor:pointer;
    font-weight:bold;
}

.btn:hover{
    opacity:.9;
}

.info{
    background:#22314f;
    border-radius:10px;
    padding:10px;
    margin-top:10px;
    line-height:1.7;
}

.info b{
    color:#ffd54a;
}

#qrisArea{
    text-align:center;
}

#qrisArea img{
    width:240px;
    max-width:100%;
}

.status-item{
    background:#22314f;
    border-radius:10px;
    padding:10px;
    margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h2>💰 Wallet</h2>

<div class="card saldo">

<small>Saldo Coin</small>

<h1 id="saldo">0</h1>
<button class="btn" id="btnRefresh">
🔄 Refresh
</button>
<button class="btn"
id="btnPortal">

🏠 Kembali ke Portal

</button>
</div>

<div class="tabs">

<button id="btnDep" class="active">
Deposit
</button>

<button id="btnWd">
Withdraw
</button>

</div>
<!-- ========================= -->
<!-- DEPOSIT -->
<!-- ========================= -->

<div id="deposit" class="card">

<label>Metode Deposit</label>

<select id="metode">
    <option value="Transfer">Transfer Bank</option>
    <option value="QRIS">QRIS</option>
</select>

<div id="transferArea">

<label>Pilih Bank Tujuan</label>

<select id="bank">

    <option value="Mandiri">Mandiri</option>

    <option value="BCA">BCA</option>

    <option value="BRI">BRI</option>

    <option value="SeaBank">SeaBank</option>

    <option value="DANA / GoPay">DANA / GoPay</option>

</select>

<div class="info">

<b>Atas Nama</b><br>

YUDI ALIYUDIN

<br><br>

<b>Nomor Rekening</b><br>

<span id="rekening">
1340033268904
</span>

</div>

</div>

<div id="qrisArea" class="hidden">

<label>Scan QRIS</label>

<img src="qris.png" alt="QRIS">

</div>

<label>Nominal Deposit</label>

<input
type="number"
id="nominalDep"
placeholder="Minimal Rp10.000">

<button
class="btn"
id="btnRequestDep">

REQUEST DEPOSIT

</button>

</div>

<!-- ========================= -->
<!-- WITHDRAW -->
<!-- ========================= -->

<div
id="withdraw"
class="card hidden">

<label>Bank</label>

<input
id="bankUser"
readonly>

<label>Nama Rekening</label>

<input
id="namaUser"
readonly>

<label>Nomor Rekening</label>

<input
id="rekUser"
readonly>

<label>Nominal Withdraw</label>

<input
type="number"
id="nominalWd"
placeholder="Masukkan nominal">

<button
class="btn"
id="btnRequestWd">

REQUEST WITHDRAW

</button>

</div>

<!-- ========================= -->
<!-- STATUS -->
<!-- ========================= -->

<div class="card">

<h3>Status Transaksi</h3>

<div id="statusList">

Belum ada transaksi.

</div>

</div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

// ==========================
// FIREBASE
// ==========================

const firebaseConfig = {
    apiKey: "AIzaSyBeTALsF43ij3aAlZjF1XeBjB1gNtaTb2I",
    authDomain: "game-demo-4db7f.firebaseapp.com",
    projectId: "game-demo-4db7f",
    storageBucket: "game-demo-4db7f.firebasestorage.app",
    messagingSenderId: "405381506143",
    appId: "1:405381506143:web:da63f34a24f01e4f0367ea"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let player = null;

// ==========================
// ELEMEN HTML
// ==========================

const saldo = document.getElementById("saldo");
const btnRefresh =
document.getElementById("btnRefresh");

btnRefresh.onclick=()=>{


};
const btnPortal=
document.getElementById("btnPortal");

btnPortal.onclick=()=>{

location.href="portal.html";

};
const btnDep = document.getElementById("btnDep");
const btnWd = document.getElementById("btnWd");

const deposit = document.getElementById("deposit");
const withdraw = document.getElementById("withdraw");

const metode = document.getElementById("metode");

const transferArea = document.getElementById("transferArea");
const qrisArea = document.getElementById("qrisArea");

const bank = document.getElementById("bank");
const rekening = document.getElementById("rekening");

const nominalDep = document.getElementById("nominalDep");
const nominalWd = document.getElementById("nominalWd");

const btnRequestDep = document.getElementById("btnRequestDep");
const btnRequestWd = document.getElementById("btnRequestWd");

const bankUser = document.getElementById("bankUser");
const namaUser = document.getElementById("namaUser");
const rekUser = document.getElementById("rekUser");

const statusList = document.getElementById("statusList");

// ==========================
// REKENING TUJUAN
// ==========================

const rekeningMap = {

    "Mandiri":"1340033268904",

    "BCA":"4180734771",

    "BRI":"004601060489505",

    "SeaBank":"901341445605",

    "DANA / GoPay":"082319264646"

};

rekening.innerHTML = rekeningMap[bank.value];


// ==========================
// LOGIN & AMBIL DATA PLAYER
// ==========================

auth.onAuthStateChanged(async(user)=>{

    if(!user){
        location.href="index.html";
        return;
    }

    try{

        const doc = await db.collection("players")
            .doc(user.uid)
            .get();

        if(!doc.exists){
            alert("Data player tidak ditemukan.");
            auth.signOut();
            return;
        }

        player = doc.data();

        // Saldo
        saldo.innerHTML = Number(
            player.wallet?.coin || 0
        ).toLocaleString("id-ID");

        // Data Bank User
        bankUser.value = player.bank?.namaBank || "";
        namaUser.value = player.bank?.namaRekening || "";
        rekUser.value = player.bank?.noRekening || "";
loadTransaksi();
listenWallet();

    }catch(err){

        console.error(err);

        alert("Gagal mengambil data player.");

    }

});

// ==========================
// TAB DEPOSIT & WITHDRAW
// ==========================

btnDep.onclick=()=>{

    btnDep.classList.add("active");
    btnWd.classList.remove("active");

    deposit.classList.remove("hidden");
    withdraw.classList.add("hidden");

};

btnWd.onclick=()=>{

    btnWd.classList.add("active");
    btnDep.classList.remove("active");

    withdraw.classList.remove("hidden");
    deposit.classList.add("hidden");

};

// ==========================
// PILIH METODE DEPOSIT
// ==========================

bank.onchange=()=>{

    rekening.innerHTML = rekeningMap[bank.value];

};

metode.onchange=()=>{

    if(metode.value==="QRIS"){

        transferArea.classList.add("hidden");
        qrisArea.classList.remove("hidden");

    }else{

        transferArea.classList.remove("hidden");
        qrisArea.classList.add("hidden");

    }

};


// ==========================
// REQUEST DEPOSIT
// ==========================

btnRequestDep.onclick = async () => {

    if(!auth.currentUser){
        alert("Silakan login terlebih dahulu.");
        return;
    }

    const nominal = Number(nominalDep.value);

    if(isNaN(nominal) || nominal < 10000){
        alert("Minimal deposit Rp10.000");
        nominalDep.focus();
        return;
    }

    try{

        await db.collection("deposit").add({

            uid: auth.currentUser.uid,

            email: auth.currentUser.email,

            nickname: player.profile?.nickname || "",

            nominal: nominal,

            metode: metode.value,

            bankTujuan: metode.value==="Transfer" ? bank.value : "QRIS",

            status: "Pending",

            createdAt: firebase.firestore.FieldValue.serverTimestamp()

        });

        alert("Request deposit berhasil dikirim.\nMenunggu konfirmasi Admin.");

        nominalDep.value="";

    }catch(err){

        console.error(err);

        alert("Gagal mengirim request deposit.");

    }

};



// ==========================
// REQUEST WITHDRAW
// ==========================

btnRequestWd.onclick = async () => {

    if(!auth.currentUser){
        alert("Silakan login terlebih dahulu.");
        return;
    }

    const nominal = Number(nominalWd.value);

    if(isNaN(nominal) || nominal < 10000){
        alert("Minimal withdraw Rp10.000");
        nominalWd.focus();
        return;
    }

    if(nominal > Number(player.wallet.coin)){
        alert("Saldo Coin tidak mencukupi.");
        return;
    }

    try{

        await db.collection("withdraw").add({

            uid: auth.currentUser.uid,

            email: auth.currentUser.email,

            nickname: player.profile?.nickname || "",

            nominal: nominal,

            bank: player.bank.namaBank,

            namaRekening: player.bank.namaRekening,

            noRekening: player.bank.noRekening,

            status: "Pending",

            createdAt: firebase.firestore.FieldValue.serverTimestamp()

        });

        alert("Request withdraw berhasil dikirim.\nMenunggu konfirmasi Admin.");

        nominalWd.value="";

    }catch(err){

        console.error(err);

        alert("Gagal mengirim request withdraw.");

    }

};

// ==========================
// RIWAYAT TRANSAKSI
// ==========================

function loadTransaksi(){

    if(!auth.currentUser) return;

    statusList.innerHTML = "Memuat...";

    let html = "";

    db.collection("deposit")
    .where("uid","==",auth.currentUser.uid)
    .orderBy("createdAt","desc")
    .onSnapshot((snap)=>{

        html="";

        snap.forEach(doc=>{

            const d=doc.data();

            html += `
            <div class="status-item">
                <b>📥 Deposit</b><br>
                Rp ${Number(d.nominal).toLocaleString("id-ID")}<br>
                ${d.bankTujuan}<br>
                Status :
<b style="
color:
${
d.status=="Success"
?"#00ff88":
d.status=="Reject"
?"#ff4444":
"#ffd54a"
}">
${d.status}
</b>
            </div>
            `;

        });

        db.collection("withdraw")
.where("uid","==",auth.currentUser.uid)
.orderBy("createdAt","desc")
.onSnapshot((ws)=>{

            ws.forEach(doc=>{

                const d=doc.data();

                html += `
                <div class="status-item">
                    <b>📤 Withdraw</b><br>
                    Rp ${Number(d.nominal).toLocaleString("id-ID")}<br>
                    ${d.bank}<br>
                    Status :
<b style="
color:
${
d.status=="Success"
?"#00ff88":
d.status=="Reject"
?"#ff4444":
"#ffd54a"
}">
${d.status}
</b>
                </div>
                `;

            });

            if(html===""){
                html="Belum ada transaksi.";
            }

            statusList.innerHTML=html;

        });

    });

}


// ==========================
// UPDATE SALDO REALTIME
// ==========================

function listenWallet(){

    if(!auth.currentUser) return;

    db.collection("players")
    .doc(auth.currentUser.uid)
    .onSnapshot((doc)=>{

        if(!doc.exists) return;

        player = doc.data();

        saldo.innerHTML = Number(
            player.wallet.coin || 0
        ).toLocaleString("id-ID");

    });

}
</script>

</body>
</html>
