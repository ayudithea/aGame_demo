<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>
🍓 Fruit Spin
</title>

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

-webkit-tap-highlight-color:transparent;

}

html,body{

width:100%;

height:100%;

overflow:hidden;

font-family:Arial,sans-serif;

background:

linear-gradient(

180deg,

#63d8ff 0%,

#ffe7a3 100%

);

}

body{

display:flex;

justify-content:center;

align-items:center;

}

#game{

width:430px;

max-width:100%;

padding:8px;

}

.header{

background:

linear-gradient(

180deg,

#ffb300,

#ff9800

);

color:white;

font-size:30px;

font-weight:bold;

text-align:center;

padding:15px;

border-radius:

18px

18px

0

0;

box-shadow:

0 6px 15px

rgba(0,0,0,.35);

}

.panel{

background:#fff9dd;

display:flex;

justify-content:space-between;

align-items:center;

padding:10px 15px;

font-size:18px;

font-weight:bold;

border-left:

4px solid #8b5a2b;

border-right:

4px solid #8b5a2b;

}

.board{

background:#8b5a2b;

padding:10px;

border-radius:

0

0

18px

18px;

box-shadow:

0 10px 20px

rgba(0,0,0,.35);

}

#grid{

display:grid;

grid-template-columns:

repeat(5,1fr);

gap:8px;

}

.cell{

width:100%;

aspect-ratio:1;

background:#fff;

border-radius:12px;

display:flex;

justify-content:center;

align-items:center;

font-size:48px;

position:relative;

overflow:hidden;

user-select:none;

transition:

transform .25s,

opacity .25s;

}

.cell::after{

content:"";

position:absolute;

left:0;

top:0;

width:100%;

height:100%;

background:

linear-gradient(

rgba(255,255,255,.35),

rgba(255,255,255,0)

);

pointer-events:none;

}

.spin{

animation:

spinDrop

.15s

linear

infinite;

}

@keyframes spinDrop{

0%{

transform:

translateY(-80px);

opacity:.2;

}

100%{

transform:

translateY(0);

opacity:1;

}

}
.break{

animation:

breakAnim

.45s

forwards;

}

@keyframes breakAnim{

0%{

transform:

scale(1);

opacity:1;

}

35%{

transform:

scale(1.25)

rotate(12deg);

}

100%{

transform:

scale(0);

opacity:0;

}

}

.drop{

animation:

dropAnim

.35s;

}

@keyframes dropAnim{

0%{

transform:

translateY(-90px);

}

100%{

transform:

translateY(0);

}

}

.winFlash{

animation:

flashWin

.6s;

}

@keyframes flashWin{

0%{

filter:brightness(1);

}

25%{

filter:brightness(2);

}

50%{

filter:brightness(1);

}

75%{

filter:brightness(2);

}

100%{

filter:brightness(1);

}

}

button{

width:100%;

margin-top:12px;

padding:16px;

border:none;

border-radius:14px;

background:

linear-gradient(

180deg,

#ffb300,

#ff9800

);

font-size:22px;

font-weight:bold;

color:white;

cursor:pointer;

box-shadow:

0 6px 12px

rgba(0,0,0,.35);

transition:.15s;

}

button:active{

transform:scale(.97);

}

#message{

margin-top:10px;

text-align:center;

font-size:20px;

font-weight:bold;

color:#5a3300;

min-height:28px;

}

.comboText{

position:fixed;

left:50%;

top:45%;

transform:translate(-50%,-50%);

font-size:56px;

font-weight:bold;

color:#fff;

text-shadow:

0 0 15px #000;

pointer-events:none;

animation:

comboAnim

1s

forwards;

}

@keyframes comboAnim{

0%{

opacity:0;

transform:

translate(-50%,-50%)

scale(.2);

}

30%{

opacity:1;

transform:

translate(-50%,-50%)

scale(1.4);

}

100%{

opacity:0;

transform:

translate(-50%,-180%)

scale(1);

}

}

</style>
</head>

<body>

<div id="game">

<div class="header">
🍓 FRUIT SPIN
</div>

<div class="panel">

<div>
💰 Skor :
<span id="score">0</span>
</div>

<div>
🔥 Combo :
<span id="combo">0</span>
</div>

</div>

<div class="board">

<div id="grid">

</div>

<button id="spinBtn">

🎰 SPIN

</button>

<div id="message">

Tekan tombol SPIN

</div>

</div>

</div>

<script>

const ROWS=5;

const COLS=5;

const fruits=[

"🍎",

"🍓",

"🍍",

"🥝",

"🍇",

"🥭",

"🍒",

"🍉",

"🥥"

];

let board=[];

let score=0;

let combo=0;

let spinning=false;

const grid=document.getElementById("grid");

const scoreText=document.getElementById("score");

const comboText=document.getElementById("combo");

const message=document.getElementById("message");

const spinBtn=document.getElementById("spinBtn");

function randomFruit(){

return fruits[
Math.floor(
Math.random()*fruits.length
)
];

}

function updateScore(){

scoreText.textContent=score;

comboText.textContent=combo;

}

function createBoard(){

board=[];

for(let r=0;r<ROWS;r++){

const row=[];

for(let c=0;c<COLS;c++){

row.push(randomFruit());

}

board.push(row);

}

drawBoard();

}
function drawBoard(){

grid.innerHTML="";

for(let r=0;r<ROWS;r++){

for(let c=0;c<COLS;c++){

const cell=document.createElement("div");

cell.className="cell";

cell.dataset.row=r;

cell.dataset.col=c;

cell.textContent=board[r][c];

grid.appendChild(cell);

}

}

}

function sleep(ms){

return new Promise(resolve=>setTimeout(resolve,ms));

}

async function animateSpin(){

const cells=document.querySelectorAll(".cell");

cells.forEach(cell=>cell.classList.add("spin"));

for(let i=0;i<20;i++){

for(let r=0;r<ROWS;r++){

for(let c=0;c<COLS;c++){

board[r][c]=randomFruit();

}

}

drawBoard();

document.querySelectorAll(".cell")

.forEach(cell=>cell.classList.add("spin"));

await sleep(80);

}

document.querySelectorAll(".cell")

.forEach(cell=>cell.classList.remove("spin"));

}

function showMessage(text){

message.textContent=text;

}

createBoard();

updateScore();
async function spin(){

if(spinning) return;

spinning=true;

spinBtn.disabled=true;

combo=0;

updateScore();

showMessage("🎰 SPIN...");

await animateSpin();

await sleep(300);

showMessage("🔍 Mencari kombinasi...");

const result=findMatches();

if(result.length>=8){

showMessage("🎉 Ada kombinasi!");

await destroyMatches(result);

}else{

showMessage("❌ Tidak ada kombinasi. Tekan SPIN lagi.");

spinBtn.disabled=false;

spinning=false;

return;

}

spinBtn.disabled=false;

spinning=false;

}

spinBtn.onclick=spin;

async function reshuffleBoard(){

showMessage("🔄 Mengacak ulang...");

await animateSpin();

const result=findMatches();

if(result.length>=8){

await destroyMatches(result);

}else{

await reshuffleBoard();

}

}
function findMatches(){

const visited=Array.from(
{length:ROWS},
()=>Array(COLS).fill(false)
);

let best=[];

for(let r=0;r<ROWS;r++){

for(let c=0;c<COLS;c++){

if(visited[r][c]) continue;

const fruit=board[r][c];

const group=[];

floodFill(
r,
c,
fruit,
visited,
group
);

if(group.length>=8){

best.push(...group);

}

}

}

return best;

}

function floodFill(

r,

c,

fruit,

visited,

group

){

if(

r<0||

c<0||

r>=ROWS||

c>=COLS

){

return;

}

if(visited[r][c]){

return;

}

if(board[r][c]!=fruit){

return;

}

visited[r][c]=true;

group.push({

r:r,

c:c

});

floodFill(r-1,c,fruit,visited,group);

floodFill(r+1,c,fruit,visited,group);

floodFill(r,c-1,fruit,visited,group);

floodFill(r,c+1,fruit,visited,group);

}
async function destroyMatches(matches){

const cells=document.querySelectorAll(".cell");

matches.forEach(pos=>{

const index=pos.r*COLS+pos.c;

cells[index].classList.add("break");

});

await sleep(500);

matches.forEach(pos=>{

board[pos.r][pos.c]=null;

});

drawBoard();

await sleep(150);

await gravity();

const again=findMatches();

if(again.length>=8){

combo++;

updateScore();

showCombo();

await destroyMatches(again);

}else{

showMessage("✅ Selesai");

}

}

function showCombo(){

const d=document.createElement("div");

d.className="comboText";

d.innerHTML="COMBO x"+combo;

document.body.appendChild(d);

setTimeout(()=>{

d.remove();

},1000);

}
async function gravity(){

for(let c=0;c<COLS;c++){

let stack=[];

for(let r=ROWS-1;r>=0;r--){

if(board[r][c]!=null){

stack.push(board[r][c]);

}

}

for(let r=ROWS-1;r>=0;r--){

if(stack.length){

board[r][c]=stack.shift();

}else{

board[r][c]=randomFruit();

}

}

}

drawBoard();

document

.querySelectorAll(".cell")

.forEach(cell=>{

cell.classList.add("drop");

});

await sleep(400);

document

.querySelectorAll(".cell")

.forEach(cell=>{

cell.classList.remove("drop");

});

let point=0;

for(let r=0;r<ROWS;r++){

for(let c=0;c<COLS;c++){

if(board[r][c]!=null){

point++;

}

}

}

score+=combo*100;

updateScore();

if(combo>=2){

showMessage("🔥 COMBO x"+combo);

}else{

showMessage("🎉 Menang!");

}

if(combo==5){

showMessage("🏆 BIG WIN");

}

if(combo==8){

showMessage("💎 MEGA WIN");

}

if(combo>=10){

showMessage("👑 JACKPOT");

if(navigator.vibrate){

navigator.vibrate([200,100,200,100,300]);

}

}

}
function resetBoard(){

combo=0;

updateScore();

createBoard();

showMessage("Tekan tombol SPIN");

}

function gameInit(){

createBoard();

updateScore();

showMessage("Siap Bermain");

}

window.onload=()=>{

gameInit();

};

document.addEventListener("keydown",e=>{

if(e.code==="Space"){

e.preventDefault();

spin();

}

});

document.addEventListener("visibilitychange",()=>{

if(document.hidden){

spinning=false;

spinBtn.disabled=false;

}

});

</script>

</body>

</html>
