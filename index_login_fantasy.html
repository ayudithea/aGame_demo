
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fantasy Login</title>
<style>
body{
margin:0;font-family:Arial,sans-serif;
background:url('https://images.unsplash.com/photo-1511512578047-dfb367046420?auto=format&fit=crop&w=1200&q=80') center/cover fixed;
}
.overlay{background:rgba(0,0,0,.6);min-height:100vh;padding:20px}
.logo{
margin:20px auto;text-align:center;color:#ffd54a;font-size:38px;font-weight:bold}
.banner{
height:150px;border-radius:18px;
background:linear-gradient(135deg,#23395d,#0c1628);
display:flex;align-items:center;justify-content:center;
color:#fff;font-size:32px;font-weight:bold;margin-bottom:18px}
.icons{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:15px 0}
.icon{
width:72px;height:72px;border:2px solid #ffd54a;border-radius:14px;
display:flex;align-items:center;justify-content:center;
background:#111;color:#ffd54a;font-size:30px}
.card{
max-width:430px;margin:20px auto;background:rgba(20,20,20,.75);
padding:20px;border-radius:20px;border:2px solid #ffd54a}
h2{text-align:center;color:#fff}
input{
width:100%;padding:14px;margin:10px 0;border-radius:12px;
border:2px solid #ffd54a;background:#222;color:#fff}
button{
width:100%;padding:14px;margin-top:12px;
background:#ffd54a;border:none;border-radius:14px;
font-size:20px;font-weight:bold}
.social{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px}
.sbtn{padding:12px;border-radius:12px;background:#222;color:#fff;text-align:center;border:1px solid #ffd54a}
</style>
</head>
<body>
<div class="overlay">
<div class="logo">⚔️ FANTASY QUEST</div>
<div class="banner">Mulai Petualangan</div>

<div class="icons">
<div class="icon">🧙</div>
<div class="icon">🐉</div>
<div class="icon">🏆</div>
<div class="icon">🎁</div>
<div class="icon">⭐</div>
</div>

<div class="card">
<h2>Silakan Login</h2>
<input placeholder="Username">
<input type="password" placeholder="Password">
<button>Log In</button>
<button>Daftar</button>

<div class="social">
<div class="sbtn">Discord</div>
<div class="sbtn">Telegram</div>
<div class="sbtn">Facebook</div>
<div class="sbtn">Bantuan</div>
</div>
</div>
</div>
</body>
</html>
