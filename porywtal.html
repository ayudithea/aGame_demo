<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Legends Portal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#090909;color:#fff}
.header{position:sticky;top:0;background:#000;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #d7a400;z-index:99}
.logo{font-size:28px;font-weight:bold;color:#ffd84a}
.menu{font-size:30px}
.profile{background:linear-gradient(#ffe36e,#f0bb00);color:#000;padding:10px 18px;border-radius:12px;font-weight:bold}
.banner{margin:14px;border:2px solid #d7a400;border-radius:18px;height:180px;background:linear-gradient(135deg,#332300,#b98b00,#332300);display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:bold}
.games{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:14px}
.card{background:#111;border:2px solid #d7a400;border-radius:16px;overflow:hidden;box-shadow:0 0 15px rgba(255,215,0,.2)}
.thumb{height:110px;background:linear-gradient(135deg,#444,#111);display:flex;align-items:center;justify-content:center;font-size:52px}
.info{padding:12px}
.title{font-size:18px;font-weight:bold;margin-bottom:10px}
.play{display:block;text-align:center;text-decoration:none;background:linear-gradient(#ffe36e,#efb700);color:#000;padding:10px;border-radius:10px;font-weight:bold}
.play:hover{filter:brightness(1.05)}
.footer{text-align:center;color:#999;padding:24px}
</style>
</head>
<body>

<div class="header">
<div class="menu">☰</div>
<div class="logo">LEGENDS PORTAL</div>
<div class="profile">Profil</div>
</div>

<div class="banner">SELAMAT DATANG</div>

<div class="games">
<div class="card"><div class="thumb">🍓</div><div class="info"><div class="title">Fruit Match</div><a class="play" href="fruit.html">MAIN</a></div></div>
<div class="card"><div class="thumb">🔢</div><div class="info"><div class="title">2048</div><a class="play" href="2048.html">MAIN</a></div></div>
<div class="card"><div class="thumb">🐍</div><div class="info"><div class="title">Snake</div><a class="play" href="snake.html">MAIN</a></div></div>
<div class="card"><div class="thumb">🧩</div><div class="info"><div class="title">Puzzle</div><a class="play" href="puzzle.html">MAIN</a></div></div>
<div class="card"><div class="thumb">🚀</div><div class="info"><div class="title">Runner</div><a class="play" href="runner.html">MAIN</a></div></div>
<div class="card"><div class="thumb">🎯</div><div class="info"><div class="title">Target</div><a class="play" href="target.html">MAIN</a></div></div>
<div class="card"><div class="thumb">♟️</div><div class="info"><div class="title">Catur</div><a class="play" href="catur.html">MAIN</a></div></div>
<div class="card"><div class="thumb">🃏</div><div class="info"><div class="title">Kartu</div><a class="play" href="kartu.html">MAIN</a></div></div>
</div>

<div class="footer">© Legends Portal</div>
</body>
</html>
