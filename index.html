<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LEGENDS PORTAL - Login</title>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;

    background-image:
        linear-gradient(rgba(0,0,0,.35),rgba(0,0,0,.55)),
        url("zeus.png");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;

    color:#fff;
animation:lightning 3s ease-out 1;
}

body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;

    background-image:
        radial-gradient(circle,#ffffff66 1px,transparent 1px);

    background-size:40px 40px;

    opacity:.12;

    animation:starsMove 25s linear infinite;
}

@keyframes starsMove{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(40px);
    }
}

.wrap{
    position:relative;
    top:var(--panel-atas);
    bottom:var(--panel-bawah);
    left:var(--panel-kiri);
    right:var(--panel-kanan);
}
.field-email{
    position:relative;
    top:var(--email-atas);
    bottom:var(--email-bawah);
    left:var(--email-kiri);
    right:var(--email-kanan);
}
.field-pass{
    position:relative;
    top:var(--pass-atas);
    bottom:var(--pass-bawah);
    left:var(--pass-kiri);
    right:var(--pass-kanan);
}
.card{
    background:rgba(8,12,25,.55);
    backdrop-filter:blur(16px);
    border:1px solid rgba(255,215,64,.35);
    border-radius:28px;
   padding:15px 22px 22px;
    box-shadow:0 0 30px rgba(255,193,7,.18);
height:var(--panel-tinggi);
}
.logo{
    font-size:52px;
    margin-bottom:5px;
}
@keyframes logoGlow{
    0%,100%{
        filter:drop-shadow(0 0 8px gold);
    }
    50%{
        filter:drop-shadow(0 0 25px #ffd700);
    }
}

.logo{
    animation:logoGlow 2.5s infinite;
}
h1{
    font-size:42px;
}
h1{
text-align:center;
color:#ffd54f;
margin:8px 0;
text-shadow:0 0 12px #ffb300;
}
.sub{
text-align:center;
color:#ddd;
margin-bottom:22px;
}
.field{
    height:58px;
    margin:12px 0;
}
.icon{padding:14px;font-size:20px}
input{
flex:1;
padding:15px;
border:none;
outline:none;
background:transparent;
color:#fff;
font-size:16px;
}
.eye{
padding:14px;
cursor:pointer;
}
button{
    position:relative;
    overflow:hidden;
}

button::before{
    content:"";
    position:absolute;
    top:0;
    left:-120%;
    width:60%;
    height:100%;
    background:linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.55),
        transparent
    );
    animation:shine 3s infinite;
}

@keyframes shine{
    100%{
        left:170%;
    }
}
.login{
    background:linear-gradient(to bottom,#ffe87c,#ffbf00,#d99000);
    color:#222;
    border:2px solid #ffd84d;
    border-radius:16px;
    box-shadow:
        0 8px 0 #996300,
        0 12px 20px rgba(255,180,0,.5);
    transition:.15s;
}

.login:active{
    transform:translateY(6px);
    box-shadow:
        0 2px 0 #996300;
}
.register{
    background:linear-gradient(to bottom,#32ff7e,#00c853,#009624);
    color:#fff;
    border:2px solid #6dff8f;
    border-radius:16px;
    box-shadow:
        0 8px 0 #006b1d,
        0 12px 20px rgba(0,180,70,.45);
    transition:.15s;
}

.register:active{
    transform:translateY(6px);
    box-shadow:
        0 2px 0 #006b1d;
}
.links{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:18px;
}
.links a{
text-decoration:none;
padding:12px;
text-align:center;
border-radius:14px;
background:#1f2937;
color:#fff;
}
#msg{
margin-top:16px;
text-align:center;
min-height:22px;
color:#ffd54f;
}
:root{

/* ========================= */
/* PANEL LOGIN */
/* ========================= */
--panel-atas:80px;
--panel-bawah:0px;
--panel-kiri:0px;
--panel-kanan:0px;

/* ========================= */
/* LOGO */
/* ========================= */
--logo-atas:0px;
--logo-bawah:0px;
--logo-kiri:0px;
--logo-kanan:0px;

/* ========================= */
/* JUDUL */
/* ========================= */
--judul-atas:0px;
--judul-bawah:0px;
--judul-kiri:0px;
--judul-kanan:0px;

/* ========================= */
/* EMAIL */
/* ========================= */
--email-atas:0px;
--email-bawah:0px;
--email-kiri:0px;
--email-kanan:0px;

/* ========================= */
/* PASSWORD */
/* ========================= */
--pass-atas:0px;
--pass-bawah:0px;
--pass-kiri:0px;
--pass-kanan:0px;

/* ========================= */
/* LOGIN */
/* ========================= */
--login-atas:0px;
--login-bawah:0px;
--login-kiri:0px;
--login-kanan:0px;

/* ========================= */
/* DAFTAR */
/* ========================= */
--daftar-atas:0px;
--daftar-bawah:0px;
--daftar-kiri:0px;
--daftar-kanan:0px;

/* ========================= */
/* BANTUAN */
/* ========================= */
--bantuan-atas:0px;
--bantuan-bawah:0px;
--bantuan-kiri:0px;
--bantuan-kanan:0px;

/* ========================= */
/* KOMUNITAS */
/* ========================= */
--komunitas-atas:0px;
--komunitas-bawah:0px;
--komunitas-kiri:0px;
--komunitas-kanan:0px;

}
</style>
</head>
<body>
<div class="wrap">
<div class="card">
<div class="field">
<div class="icon">📧</div>
<input id="email" type="email" placeholder="Email">
</div>

<div class="field">
<div class="icon">🔒</div>
<input id="password" type="password" placeholder="Password">
<div class="eye" onclick="password.type=password.type==='password'?'text':'password';this.textContent=password.type==='password'?'👁️':'🙈'">👁️</div>
</div>

<button class="login" onclick="login()">LOGIN</button>
<button class="register" onclick="location.href='register.html'">DAFTAR AKUN</button>

<div id="msg"></div>

<div class="links">
<a href="#">💬 Bantuan</a>
<a href="#">🌐 Komunitas</a>
</div>
</div>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyBeTALsF43ij3aAlZjF1XeBjB1gNtaTb2I",
authDomain:"game-demo-4db7f.firebaseapp.com",
projectId:"game-demo-4db7f",
storageBucket:"game-demo-4db7f.firebasestorage.app",
messagingSenderId:"405381506143",
appId:"1:405381506143:web:da63f34a24f01e4f0367ea"
};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
auth.onAuthStateChanged(u=>{if(u)location.href='portal.html';});
function login(){
const e=email.value.trim(),p=password.value.trim();
msg.textContent="Memverifikasi...";
auth.signInWithEmailAndPassword(e,p)
.then(()=>location.href='portal.html')
.catch(err=>msg.textContent=err.message);
}
</script>
<audio id="thunder" src="thunder.mp3"></audio>

<script>
window.addEventListener("load",()=>{
    setTimeout(()=>{
        document.getElementById("thunder").play().catch(()=>{});
    },400);
});
</script>
</body>
</html>
