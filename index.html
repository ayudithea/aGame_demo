<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
}
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

.container{
    position:relative;
    width:min(100vw,520px);
}

.bg{
    display:block;
    width:100%;
    height:auto;
}

.panel{
    position:absolute;
    inset:0;
}

/* ========================= */
/* EMAIL */
/* ========================= */
.email{
    position:absolute;
    top:36.8%;
    left:21%;
    width:58%;
    height:3.8%;

    display:flex;
    align-items:center;
}

/* ========================= */
/* PASSWORD */
/* ========================= */
.pass{
    position:absolute;
    top:43.5%;
    left:21%;
    width:58%;
    height:3.8%;

    display:flex;
    align-items:center;
}

/* ========================= */
/* INPUT */
/* ========================= */
.field input{
    flex:1;
    border:none;
    outline:none;
    background:transparent;

    color:#ffffff;
    font-size:18px;
}

.field input::placeholder{
    color:#cfcfcf;
}

.icon{
    font-size:22px;
    margin-right:10px;
}

.eye{
    position:relative;
    right:45px;      /* geser ke kiri */
    cursor:pointer;
    font-size:22px;
}

/* ========================= */
/* LOGIN */
/* ========================= */
.login{
    position:absolute;

    top:63%;
    left:21%;

    width:58%;
    height:4.8%;

    background:none;
    border:none;

    color:#fff;
    font-size:20px;
    font-weight:bold;

    cursor:pointer;
}

/* ========================= */
/* DAFTAR */
/* ========================= */
.register{
    position:absolute;

    top:63%;
    left:21%;

    width:58%;
    height:4.8%;

    background:none;
    border:none;

    color:#fff;
    font-size:20px;
    font-weight:bold;

    cursor:pointer;
}
/* EMAIL */
.email{
    top:48.2%;   /* sebelumnya 36.8% */
}

/* PASSWORD */
.pass{
    top:54%;     /* sebelumnya 43.5% */
}

/* LOGIN */
.login{
    top:220%;     /* sebelumnya 54.5% */
}

/* DAFTAR AKUN */
.register{
    top:68.6%;   /* sebelumnya 63% */
}
#msg{
    position:absolute;
    left:50%;
    top:74%;
    transform:translateX(-50%);
    width:85%;
    text-align:center;
    color:#ffe16b;
    font-size:15px;
    font-weight:bold;
    text-shadow:0 0 8px #000;
}
 .popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.65);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:99999;
}

.popup-box{
    width:320px;
    background:#111;
    border:2px solid #d4a500;
    border-radius:18px;
    padding:25px;
    text-align:center;
    box-shadow:0 0 25px rgba(255,215,0,.5);
}

.popup-box h2{
    position:static;
    color:#ffd54a;
    margin-bottom:15px;
}

.popup-box p{
    color:#fff;
    margin-bottom:20px;
    line-height:1.5;
}

.popup-box button{
    width:150px;
    height:45px;
    border:none;
    border-radius:10px;
    background:linear-gradient(#ffe77d,#d4a500);
    color:#000;
    font-weight:bold;
    cursor:pointer;
}   
</style>
</head>
<body>
<div class="container">

    <img src="zeus.png" class="bg">

    <div class="panel">

        <!-- Email -->
        <div class="field email">
            <div class="icon"></div>
            <input id="email" type="email" placeholder="_">
        </div>

        <!-- Password -->
<div class="field pass">
    <div class="icon"></div>

    <input id="password" type="password" placeholder="_">

    <div class="eye"
    onclick="password.type=password.type==='password'?'text':'password';this.textContent=password.type==='password'?'👁️':'🙈'">
        👁️
    </div>

    <button class="login" onclick="login()">____</button>
</div> 
<button class="register"
onclick="location.href='register.html'"></button>
<div id="msg"></div>
   </div>     
    </div>
<script>
const firebaseConfig={
apiKey:"AIzaSyBeTALsF43ij3aAlZjF1XeBjB1gNtaTb2I",
authDomain:"game-demo-4db7f.firebaseapp.com",
projectId:"game-demo-4db7f",
storageBucket:"game-demo-4db7f.firebasestorage.app",
messagingSenderId:"405381506143",
appId:"1:405381506143:web:da63f34a24f01e4f0367ea"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();    

async function login(){

    const e = document.getElementById("email").value.trim();
    const p = document.getElementById("password").value;
    const msg = document.getElementById("msg");

    if(e==="" || p===""){
        msg.textContent = "⚠ Silakan masukkan email dan password.";
        return;
    }

    msg.textContent = "⏳ Memverifikasi akun LEGENDS PORTAL...";

    try{

        await auth.signInWithEmailAndPassword(e,p);

        msg.textContent = "✅ Login berhasil. Selamat datang di LEGENDS PORTAL.";

        setTimeout(()=>{
            location.replace("portal.html");
        },800);

    }catch(err){

        switch(err.code){

            case "auth/invalid-credential":
            case "auth/wrong-password":
            case "auth/user-not-found":
            case "auth/invalid-email":
                msg.textContent="❌ Email atau password yang Anda masukkan salah.";
                break;

            case "auth/too-many-requests":
                msg.textContent="⛔ Terlalu banyak percobaan login. Silakan coba beberapa saat lagi.";
                break;

            case "auth/network-request-failed":
                msg.textContent="🌐 Koneksi internet bermasalah. Periksa jaringan Anda.";
                break;

            default:
                msg.textContent="⚠ Terjadi kesalahan saat masuk ke LEGENDS PORTAL.";
                console.error(err);
        }

    }

}
  function showPopup(pesan, title="LEGENDS PORTAL"){
    document.getElementById("popupTitle").textContent = title;
    document.getElementById("popupText").textContent = pesan;
    document.getElementById("popup").style.display = "flex";
}

function closePopup(){
    document.getElementById("popup").style.display = "none";
}  
</script>

<audio id="bgMusic" preload="auto">
    <source src="thunder.mp3" type="audio/mpeg">
</audio>

<script>
window.addEventListener("load", () => {
    const audio = document.getElementById("bgMusic");
    audio.volume = 1; // 0.0 - 1.0
    audio.play().catch(() => {
        // Jika browser memblokir autoplay,
        // putar saat pengguna menyentuh layar pertama kali.
        document.addEventListener("click", () => {
            audio.play();
        }, { once: true });

        document.addEventListener("touchstart", () => {
            audio.play();
        }, { once: true });
    });
});
async function login(){

    showPopup("Silakan lengkapi semua data.");
    showPopup("Konfirmasi password tidak cocok.");
    showPopup("Memverifikasi akun...");

    const e = document.getElementById("email").value.trim();
    const p = document.getElementById("password").value;
    const msg = document.getElementById("msg");

    msg.textContent = "Memverifikasi...";

    try{
        await auth.signInWithEmailAndPassword(e,p);

        alert("Login berhasil");

        location.href = "portal.html";

    }catch(err){

        alert(err.code);

        showPopup("Format email tidak valid.");
        console.error(err);

    }
}    
</script>
   <div id="popup" class="popup">
    <div class="popup-box">
        <h2 id="popupTitle">LEGENDS PORTAL</h2>
        <p id="popupText"></p>
        <button onclick="closePopup()">OK</button>
    </div>
</div> 
</body>
</html>
