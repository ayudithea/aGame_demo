
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>Login</title>
<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#0b1830,#193b63,#0a1220);
height:100vh;display:flex;align-items:center;justify-content:center;
overflow:hidden;
}
.glow1,.glow2{
position:fixed;border-radius:50%;filter:blur(70px);opacity:.35
}
.glow1{width:340px;height:340px;background:#2f7cff;left:8%;top:10%}
.glow2{width:300px;height:300px;background:#ffd54d;right:10%;bottom:8%}
.card{
width:430px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,.18);
border-radius:22px;
padding:30px;
color:#fff;
box-shadow:0 20px 60px rgba(0,0,0,.45);
z-index:2;
}
.logo{text-align:center;font-size:64px}
h2{text-align:center;margin:10px 0 5px}
p{text-align:center;color:#d6e3ff;margin-bottom:22px}
input{
width:100%;
padding:14px;
margin:10px 0;
border:none;
border-radius:12px;
font-size:16px;
}
button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
background:#ffcb3d;
font-size:18px;
font-weight:bold;
cursor:pointer;
}
#status{height:20px;margin-top:14px;text-align:center;color:#ffd8d8}
.popup{
display:none;
position:fixed;inset:0;
background:rgba(0,0,0,.6);
align-items:center;
justify-content:center;
z-index:99;
}
.popupBox{
background:#fff;
color:#222;
padding:26px 34px;
border-radius:18px;
font-size:20px;
font-weight:bold;
}
</style>
</head>
<body>
<div class="glow1"></div>
<div class="glow2"></div>

<div class="card">
<div class="logo">🎮</div>
<h2>Portal Game</h2>
<p>Masuk untuk melanjutkan.</p>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">LOGIN</button>

<div id="status"></div>
</div>

<div class="popup" id="popup">
 <div class="popupBox" id="popupText">Memverifikasi...</div>
</div>

<script>
function login(){
 const u=document.getElementById('username').value.trim();
 const p=document.getElementById('password').value.trim();

 if(!u||!p){
   document.getElementById('status').textContent='Masukkan username dan password.';
   return;
 }

 document.getElementById('popup').style.display='flex';
 document.getElementById('popupText').textContent='Memverifikasi akun...';

 // Tahap berikutnya: ganti dengan pembacaan Google Sheet.
 setTimeout(()=>{
    document.getElementById('popupText').textContent='Login berhasil (demo)';
    setTimeout(()=>{
      location.href='portal.html';
    },1000);
 },1200);
}
</script>
</body>
</html>
