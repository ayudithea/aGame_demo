<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
}
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

.container{
    position:relative;
    width:min(100vw,520px);
}

.bg{
    display:block;
    width:100%;
    height:auto;
}

.panel{
    position:absolute;
    inset:0;
}

/* ========================= */
/* EMAIL */
/* ========================= */
.email{
    position:absolute;
    top:36.8%;
    left:21%;
    width:58%;
    height:3.8%;

    display:flex;
    align-items:center;
}

/* ========================= */
/* PASSWORD */
/* ========================= */
.pass{
    position:absolute;
    top:43.5%;
    left:21%;
    width:58%;
    height:3.8%;

    display:flex;
    align-items:center;
}

/* ========================= */
/* INPUT */
/* ========================= */
.field input{
    flex:1;
    border:none;
    outline:none;
    background:transparent;

    color:#ffffff;
    font-size:18px;
}

.field input::placeholder{
    color:#cfcfcf;
}

.icon{
    font-size:22px;
    margin-right:10px;
}

.eye{
    position:relative;
    right:45px;      /* geser ke kiri */
    cursor:pointer;
    font-size:22px;
}

/* ========================= */
/* LOGIN */
/* ========================= */
.login{
    position:absolute;

    top:54.5%;
    left:21%;

    width:58%;
    height:4.8%;

    appearance:none;
    -webkit-appearance:none;

    background:transparent;
    border:none;
    outline:none;
    padding:0;
    margin:0;

    display:block;

    cursor:pointer;
}
.login:active{
    box-shadow:0 0 15px rgba(255,255,255,.5);
    transform:scale(0.98);
}
/* ========================= */
/* DAFTAR */
/* ========================= */
.register{
    position:absolute;

    top:63%;
    left:21%;

    width:58%;
    height:4.8%;

    background:none;
    border:none;

    color:#fff;
    font-size:20px;
    font-weight:bold;

    cursor:pointer;
}
/* EMAIL */
.email{
    top:48.2%;   /* sebelumnya 36.8% */
}

/* PASSWORD */
.pass{
    top:54%;     /* sebelumnya 43.5% */
}

/* LOGIN */
.login{
    top:220%;     /* sebelumnya 54.5% */
}

/* DAFTAR AKUN */
.register{
    top:68.6%;   /* sebelumnya 63% */
}

</style>
</head>
<body>
<div class="container">

    <img src="zeus.png" class="bg">

    <div class="panel">

        <!-- Email -->
        <div class="field email">
            <div class="icon"></div>
            <input id="email" type="email" placeholder="_">
        </div>

        <!-- Password -->
<div class="field pass">
    <div class="icon"></div>

    <input id="password" type="password" placeholder="_">

    <div class="eye"
    onclick="password.type=password.type==='password'?'text':'password';this.textContent=password.type==='password'?'👁️':'🙈'">
        👁️
    </div>

    <button class="login">.</button>
</div>

<button class="register">.</button>
   </div>     
    </div>

<audio id="bgMusic" preload="auto">
    <source src="thunder.mp3" type="audio/mpeg">
</audio>

<script>
window.addEventListener("load", () => {
    const audio = document.getElementById("bgMusic");
    audio.volume = 1; // 0.0 - 1.0
    audio.play().catch(() => {
        // Jika browser memblokir autoplay,
        // putar saat pengguna menyentuh layar pertama kali.
        document.addEventListener("click", () => {
            audio.play();
        }, { once: true });

        document.addEventListener("touchstart", () => {
            audio.play();
        }, { once: true });
    });
});
</script>
</body>
</html>
