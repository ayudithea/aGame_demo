<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LEGENDS PORTAL - Login</title>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;

    background-image:
        linear-gradient(rgba(0,0,0,.35),rgba(0,0,0,.55)),
        url("zeus.png");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;

    color:#fff;
animation:lightning 3s ease-out 1;
}

body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;

    background-image:
        radial-gradient(circle,#ffffff66 1px,transparent 1px);

    background-size:40px 40px;

    opacity:.12;

    animation:starsMove 25s linear infinite;
}

@keyframes starsMove{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(40px);
    }
}


</style>
</head>
<body>
<div class="panel">

  
    <div class="field">
        <div class="icon">📧</div>
        <input id="email" type="email" placeholder="Email">
    </div>

    <div class="field">
        <div class="icon">🔒</div>
        <input id="password" type="password" placeholder="Password">

        <div class="eye"
        onclick="password.type=password.type==='password'?'text':'password';this.textContent=password.type==='password'?'👁️':'🙈'">
        👁️
        </div>
    </div>

    <button class="login" onclick="login()">LOGIN</button>

    <button class="register"
    onclick="location.href='register.html'">
    DAFTAR AKUN
    </button>

    <div id="msg"></div>

    <div class="links">
        <a href="#">💬 Bantuan</a>
        <a href="#">🌐 Komunitas</a>
    </div>

</div>
<script>
const firebaseConfig={
apiKey:"AIzaSyBeTALsF43ij3aAlZjF1XeBjB1gNtaTb2I",
authDomain:"game-demo-4db7f.firebaseapp.com",
projectId:"game-demo-4db7f",
storageBucket:"game-demo-4db7f.firebasestorage.app",
messagingSenderId:"405381506143",
appId:"1:405381506143:web:da63f34a24f01e4f0367ea"
};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
auth.onAuthStateChanged(u=>{if(u)location.href='portal.html';});
function login(){
const e=email.value.trim(),p=password.value.trim();
msg.textContent="Memverifikasi...";
auth.signInWithEmailAndPassword(e,p)
.then(()=>location.href='portal.html')
.catch(err=>msg.textContent=err.message);
}
</script>

<audio id="bgMusic" preload="auto">
    <source src="thunder.mp3" type="audio/mpeg">
</audio>

<script>
window.addEventListener("load", () => {
    const audio = document.getElementById("bgMusic");
    audio.volume = 1; // 0.0 - 1.0
    audio.play().catch(() => {
        // Jika browser memblokir autoplay,
        // putar saat pengguna menyentuh layar pertama kali.
        document.addEventListener("click", () => {
            audio.play();
        }, { once: true });

        document.addEventListener("touchstart", () => {
            audio.play();
        }, { once: true });
    });
});
</script>
</body>
</html>
