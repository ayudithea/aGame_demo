<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Register - Legends Portal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:Arial,sans-serif;
    background:#000;
    overflow:hidden;
}
body{
    margin:0;
    width:100vw;
    height:100vh;
    overflow:hidden;
    background:#000;
    font-family:Arial,sans-serif;
}
.container{
    position:fixed;
    inset:0;
}

.panel{
    position:absolute;
    inset:0;
    background:transparent;
}

.logo{
    position:absolute;
    width:220px;
    left:50%;
    top:8%;
    transform:translateX(-50%);
}

h2{
    position:absolute;
    width:100%;
    top:28%;
    text-align:center;
    color:#ffd54a;
    text-shadow:0 0 8px #000;
}

input{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    width:320px;
    height:48px;
    padding:0 15px;
    border:2px solid #5cc8ff;
    border-radius:12px;
    background:rgba(0,0,0,.45);
    color:#fff;
    font-size:16px;
}

#email{
    top:38%;
}

#password{
    top:47%;
}

#confirm{
    top:56%;
}

#registerBtn{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    top:66%;
    width:320px;
    height:50px;
    border:none;
    border-radius:12px;
    background:linear-gradient(#34b9ff,#0b66ff);
    color:#fff;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

.back{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    top:76%;
    color:#fff;
    text-decoration:none;
}

#msg{
    position:absolute;
    left:50%;
    top:76%;
    transform:translateX(-50%);
    width:85%;
    text-align:center;
    color:#ffe16b;
    font-size:15px;
    font-weight:bold;
    text-shadow:0 0 8px #000;
}
  .popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.7);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.popup-box{
    width:320px;
    background:#111;
    border:2px solid #39b8ff;
    border-radius:15px;
    padding:25px;
    text-align:center;
    color:#fff;
    box-shadow:0 0 20px #39b8ff;
}

.popup-box h2{
    color:#ffd54a;
    margin-bottom:10px;
}

.popup-box p{
    margin-bottom:20px;
}

.popup-box button{
    width:150px;
    height:45px;
    border:none;
    border-radius:10px;
    background:linear-gradient(#3ec5ff,#006dff);
    color:#fff;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}  
</style>
</head>
<body>

<img src="register.png" class="bg" alt="Background">

<div class="container">
<div class="panel">
<img src="legen.png" class="logo" alt="Legends Portal">

<h2>REGISTER</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<input type="password" id="confirm" placeholder="Konfirmasi Password">

<button id="registerBtn" type="button">DAFTAR</button>

<a class="back" href="index.html">Kembali ke Login</a>

<div id="msg"></div>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBeTALsF43ij3aAlZjF1XeBjB1gNtaTb2I",
  authDomain: "game-demo-4db7f.firebaseapp.com",
  projectId: "game-demo-4db7f",
  storageBucket: "game-demo-4db7f.firebasestorage.app",
  messagingSenderId: "405381506143",
  appId: "1:405381506143:web:da63f34a24f01e4f0367ea"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
console.log("Firebase OK");
alert("Firebase OK");

document.getElementById("registerBtn").addEventListener("click", async function () {

    alert("Tombol diklik");

    const email = document.getElementById("email").value.trim();
    const pass = document.getElementById("password").value;
    const conf = document.getElementById("confirm").value;
const msg = document.getElementById("msg");
    if (!email || !pass || !conf) {
        alert("Lengkapi semua data.");
        return;
    }

    if (pass !== conf) {
        alert("Password tidak sama.");
        return;
    }

    try{

    if(email===""){
        msg.textContent="⚠ Silakan masukkan alamat email.";
        return;
    }

    if(pass.length<6){
        msg.textContent="⚠ Password minimal 6 karakter.";
        return;
    }

    if(pass!==conf){
    msg.textContent="⚠ Konfirmasi password tidak cocok.";
    return;
}

    msg.textContent="⏳ Membuat akun LEGENDS PORTAL...";

    await auth.createUserWithEmailAndPassword(email,pass);

    await auth.signOut();

    msg.textContent="✅ Akun LEGENDS PORTAL berhasil dibuat.";

    showSuccessPopup();

}catch(err){

    switch(err.code){

        case "auth/email-already-in-use":
            msg.textContent="📧 Email sudah terdaftar. Silakan gunakan email lain.";
            break;

        case "auth/invalid-email":
            msg.textContent="📧 Format email tidak valid.";
            break;

        case "auth/weak-password":
            msg.textContent="🔒 Password minimal 6 karakter.";
            break;

        case "auth/network-request-failed":
            msg.textContent="🌐 Tidak dapat terhubung ke server LEGENDS PORTAL.";
            break;

        default:
            msg.textContent="⚠ Terjadi kesalahan saat membuat akun LEGENDS PORTAL.";
            console.error(err);
    }

}
 });   
 function showSuccessPopup(){
    document.getElementById("successPopup").style.display="flex";
}

function goLogin(){
    auth.signOut().then(()=>{
        location.replace("index.html");
    });
}
</script>
<div id="successPopup" class="popup">
    <div class="popup-box">
        <h2>🎉 Registrasi Berhasil</h2>
        <p>Akun Anda berhasil dibuat.</p>
        <button onclick="goLogin()">OK</button>
    </div>
</div>
</body>
</html>
