<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Register - Legends Portal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:Arial,sans-serif;
    background:#000;
    overflow:hidden;
}
.bg{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
}
.container{
    position:fixed;
    inset:0;
}

.panel{
    position:absolute;
    inset:0;
    background:transparent;
}

.logo{
    position:absolute;
    width:220px;
    left:50%;
    top:8%;
    transform:translateX(-50%);
}

h2{
    position:absolute;
    width:100%;
    top:28%;
    text-align:center;
    color:#ffd54a;
    text-shadow:0 0 8px #000;
}

input{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    width:320px;
    height:48px;
    padding:0 15px;
    border:2px solid #5cc8ff;
    border-radius:12px;
    background:rgba(0,0,0,.45);
    color:#fff;
    font-size:16px;
}

#email{
    top:38%;
}

#password{
    top:47%;
}

#confirm{
    top:56%;
}

#registerBtn{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    top:66%;
    width:320px;
    height:50px;
    border:none;
    border-radius:12px;
    background:linear-gradient(#34b9ff,#0b66ff);
    color:#fff;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

.back{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    top:76%;
    color:#fff;
    text-decoration:none;
}

#msg{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    top:82%;
    width:320px;
    text-align:center;
    color:#ffd54a;
}
</style>
</head>
<body>

<img src="register.png" class="bg" alt="Background">

<div class="container">
<div class="panel">
<img src="legen.png" class="logo" alt="Legends Portal">

<h2>REGISTER</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<input type="password" id="confirm" placeholder="Konfirmasi Password">

<button id="registerBtn">DAFTAR</button>

<a class="back" href="index.html">Kembali ke Login</a>

<div id="msg"></div>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBeTALsF43ij3aAlZjF1XeBjB1gNtaTb2I",
  authDomain: "game-demo-4db7f.firebaseapp.com",
  projectId: "game-demo-4db7f",
  storageBucket: "game-demo-4db7f.firebasestorage.app",
  messagingSenderId: "405381506143",
  appId: "1:405381506143:web:da63f34a24f01e4f0367ea"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();

registerBtn.onclick=()=>{
 const email=email.value.trim();
 const pass=password.value;
 const conf=confirm.value;
 if(!email||!pass||!conf){
   msg.textContent="Lengkapi semua data.";
   return;
 }
 if(pass!==conf){
   msg.textContent="Password tidak sama.";
   return;
 }
 auth.createUserWithEmailAndPassword(email,pass)
 .then(()=>{
    msg.textContent="Registrasi berhasil.";
    setTimeout(()=>location.href="index.html",1200);
 })
 .catch(e=>msg.textContent=e.message);
};
</script>

</body>
</html>
