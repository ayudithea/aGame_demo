<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>LEGENDS PORTAL - Register</title><script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script><style>body{margin:0;height:100vh;display:flex;justify-content:center;align-items:center;background:#000;font-family:Arial,sans-serif}.container{position:relative;width:min(100vw,520px)}.bg{display:block;width:100%}.panel{position:absolute;inset:0}.field{position:absolute;left:21%;width:58%;height:3.8%;display:flex;align-items:center}.email{top:42%}.pass{top:49%}.pass2{top:56%}.field input{flex:1;background:transparent;border:none;outline:none;color:#fff;font-size:18px}.eye{position:relative;right:45px;cursor:pointer}button{position:absolute;left:21%;width:58%;height:4.8%;background:none;border:none;color:transparent;cursor:pointer}.register{top:66%}.back{top:74%}</style></head><body><div class="container"><img src="legen.png" class="bg"><div class="panel"><div class="field email"><input id="email" type="email" placeholder="_"></div><div class="field pass"><input id="password" type="password" placeholder="_"><div class="eye" onclick="toggle('password',this)">👁️</div></div><div class="field pass2"><input id="password2" type="password" placeholder="_"><div class="eye" onclick="toggle('password2',this)">👁️</div></div><button class="register" onclick="registerUser()">.</button><button class="back" onclick="location.href='index.html'">.</button></div></div><script>const firebaseConfig={apiKey:"AIzaSyBeTALsF43ij3aAlZjF1XeBjB1gNtaTb2I",authDomain:"game-demo-4db7f.firebaseapp.com",projectId:"game-demo-4db7f",storageBucket:"game-demo-4db7f.firebasestorage.app",messagingSenderId:"405381506143",appId:"1:405381506143:web:da63f34a24f01e4f0367ea"};firebase.initializeApp(firebaseConfig);const auth=firebase.auth();function toggle(id,e){const i=document.getElementById(id);i.type=i.type==="password"?"text":"password";e.textContent=i.type==="password"?"👁️":"🙈";}function registerUser(){const email=document.getElementById("email").value.trim();const pass=document.getElementById("password").value;const pass2=document.getElementById("password2").value;if(!email){alert("Email harus diisi");return;}if(pass.length<6){alert("Password minimal 6 karakter");return;}if(pass!==pass2){alert("Konfirmasi password tidak sama");return;}auth.createUserWithEmailAndPassword(email,pass).then(()=>{alert("Pendaftaran berhasil");location.href="index.html";}).catch(e=>alert(e.message));}</script></body></html>
