<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Register - Legends Portal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:Arial,sans-serif;
    background:#000;
    overflow:hidden;
}
body{
    margin:0;
    width:100vw;
    height:100vh;
    overflow-y:auto;
    background:#000;
    font-family:Arial,sans-serif;
}
.container{
    position:relative;
    min-height:100vh;
    padding-bottom:40px;
}

.panel{
    position:relative;
    min-height:1100px;
    background:transparent;
}

.logo{
    position:absolute;
    width:220px;
    left:50%;
    top:8%;
    transform:translateX(-50%);
}

.panel > h2{
position:absolute;
width:100%;
top:28%;
text-align:center;
color:#ffd54a;
text-shadow:0 0 8px #000;
}

input{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    width:320px;
    height:48px;
    padding:0 15px;
    border:2px solid #5cc8ff;
    border-radius:12px;
    background:rgba(0,0,0,.45);
    color:#fff;
    font-size:16px;
}

#email{
    top:30%;
}

#password{
    top:38%;
}

#confirm{
    top:46%;
}

#wa{
    top:54%;
}

#bank{
    top:62%;
}

#namaRekening{
    top:70%;
}

#noRekening{
    top:78%;
}

#registerBtn{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    top:87%;
    width:320px;
    height:50px;
    border:none;
    border-radius:12px;
    background:linear-gradient(#34b9ff,#0b66ff);
    color:#fff;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

.back{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    top:95%;
    color:#fff;
    text-decoration:none;
}

  .popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.7);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.popup-box{
    width:320px;
    background:#111;
    border:2px solid #39b8ff;
    border-radius:15px;
    padding:25px;
    text-align:center;
    color:#fff;
    box-shadow:0 0 20px #39b8ff;
}

.popup-box h2{
    position:static;
    width:auto;
    margin:0 0 10px;
    color:#ffd54a;
    text-align:center;
    text-shadow:none;
}

.popup-box p{
    margin-bottom:20px;
}

.popup-box button{
    width:150px;
    height:45px;
    border:none;
    border-radius:10px;
    background:linear-gradient(#3ec5ff,#006dff);
    color:#fff;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}  
</style>
</head>
<body>



<div class="container">
<div class="panel">
<img src="legen.png" class="logo" alt="Legends Portal">

<h2>REGISTER</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<input type="password" id="confirm" placeholder="Konfirmasi Password">
<input type="tel" id="wa" placeholder="Nomor WhatsApp">
<input type="text" id="bank" placeholder="Nama Bank">
<input type="text" id="namaRekening" placeholder="Nama Pemilik Rekening">
<input type="text" id="noRekening" placeholder="Nomor Rekening">
<button id="registerBtn" type="button">DAFTAR</button>

<a class="back" href="index.html">Kembali ke Login</a>


</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyBeTALsF43ij3aAlZjF1XeBjB1gNtaTb2I",
  authDomain: "game-demo-4db7f.firebaseapp.com",
  projectId: "game-demo-4db7f",
  storageBucket: "game-demo-4db7f.firebasestorage.app",
  messagingSenderId: "405381506143",
  appId: "1:405381506143:web:da63f34a24f01e4f0367ea"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db = firebase.firestore();    
    function showPopup(pesan, callback=null){

    document.getElementById("popupText").textContent = pesan;
    document.getElementById("successPopup").style.display = "flex";

    window.popupCallback = callback;
}

function closePopup(){

    document.getElementById("successPopup").style.display = "none";

    if(window.popupCallback){
        window.popupCallback();
        window.popupCallback = null;
    }

}
console.log("Firebase OK");


document.getElementById("registerBtn").addEventListener("click", async function () {

 

    const email = document.getElementById("email").value.trim();
    const pass = document.getElementById("password").value;
    const conf = document.getElementById("confirm").value;

const wa = document.getElementById("wa").value.trim();
const bank = document.getElementById("bank").value.trim();
const namaRekening = document.getElementById("namaRekening").value.trim();
const noRekening = document.getElementById("noRekening").value.trim();
    if (!email || !pass || !conf || !wa || !bank || !namaRekening || !noRekening) {
    showPopup("Silakan lengkapi semua data.");
    return;
}

    if (pass !== conf) {
    showPopup("Konfirmasi password tidak cocok.");
    return;
}
    try{

    if(pass.length < 6){
        showPopup("Password minimal 6 karakter.");
        return;
    }
await auth.createUserWithEmailAndPassword(email, pass);
const user = auth.currentUser;

await db.collection("players")
.doc(user.uid)
.set({

    profile:{
    email:user.email,
    wa:wa,
    nickname:"",
    avatar:"",
    createdAt:Date.now()
},
bank:{
    namaBank:bank,
    namaRekening:namaRekening,
    noRekening:noRekening
},

    wallet:{
        coin:0,
        diamond:0,
        ticket:0
    },

    settings:{
        music:true,
        sound:true,
        vibration:true
    },

    statistics:{
        totalPlay:0,
        totalWin:0,
        totalLose:0
    },

    games:{}

});
await auth.signOut();



    showPopup(
        "🎉 Akun berhasil dibuat.\n\nSilakan login menggunakan email dan password yang telah didaftarkan.",
        function(){
            location.replace("index.html");
        }
    );

}catch(err){

    console.log(err);
    alert(err.code + "\n" + err.message);

    switch(err.code){

        case "auth/email-already-in-use":
            showPopup("Email sudah terdaftar.");
            break;

        case "auth/invalid-email":
            showPopup("Format email tidak valid.");
            break;

        case "auth/weak-password":
            showPopup("Password minimal 6 karakter.");
            break;

        case "auth/network-request-failed":
            showPopup("Tidak dapat terhubung ke server LEGENDS PORTAL.");
            break;

        default:
            showPopup(err.message);
            console.error(err);
    }

}
});    
</script>
<div id="successPopup" class="popup">
    <div class="popup-box">

        <h2>LEGENDS PORTAL</h2>

        <p id="popupText"></p>

        <button onclick="closePopup()">OK</button>

    </div>
</div>
</body>
</html>
