<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Register - Legends Portal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:Arial,sans-serif;
    background:#000;
    overflow:hidden;
}
.bg{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
}
.container{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
}
.panel{
    width:min(92%,420px);
    backdrop-filter:blur(10px);
    background:rgba(0,0,0,.35);
    border:2px solid rgba(255,215,0,.45);
    border-radius:18px;
    padding:24px;
}
.logo{
    display:block;
    width:180px;
    margin:0 auto 18px;
}
h2{
    color:#ffd54a;
    text-align:center;
    margin-bottom:18px;
}
input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #5cc8ff;
    background:rgba(255,255,255,.08);
    color:#fff;
    font-size:16px;
}
button{
    width:100%;
    padding:14px;
    margin-top:12px;
    border:none;
    border-radius:10px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}
#registerBtn{
    background:linear-gradient(90deg,#0d6efd,#45d1ff);
    color:#fff;
}
.back{
    display:block;
    margin-top:12px;
    text-align:center;
    color:#fff;
    text-decoration:none;
}
#msg{
    margin-top:10px;
    text-align:center;
    color:#ffd54a;
}
</style>
</head>
<body>

<img src="register.png" class="bg" alt="Background">

<div class="container">
<div class="panel">
<img src="legen.png" class="logo" alt="Legends Portal">

<h2>REGISTER</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<input type="password" id="confirm" placeholder="Konfirmasi Password">

<button id="registerBtn">DAFTAR</button>

<a class="back" href="index.html">Kembali ke Login</a>

<div id="msg"></div>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
const firebaseConfig={
  apiKey:"GANTI_APIKEY",
  authDomain:"GANTI_PROJECT.firebaseapp.com",
  projectId:"GANTI_PROJECT",
  appId:"GANTI_APPID"
};

firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();

registerBtn.onclick=()=>{
 const email=email.value.trim();
 const pass=password.value;
 const conf=confirm.value;
 if(!email||!pass||!conf){
   msg.textContent="Lengkapi semua data.";
   return;
 }
 if(pass!==conf){
   msg.textContent="Password tidak sama.";
   return;
 }
 auth.createUserWithEmailAndPassword(email,pass)
 .then(()=>{
    msg.textContent="Registrasi berhasil.";
    setTimeout(()=>location.href="index.html",1200);
 })
 .catch(e=>msg.textContent=e.message);
};
</script>

</body>
</html>
