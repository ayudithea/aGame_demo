<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Login - Fruit Arcade</title>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(180deg,#1a0f05,#3b1f0b,#6d3d10);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.box{
width:100%;
max-width:420px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(10px);
border-radius:20px;
padding:30px;
box-shadow:0 10px 30px rgba(0,0,0,.5);
text-align:center;
}

.logo{
font-size:60px;
margin-bottom:10px;
}

h2{
color:#fff;
margin-bottom:5px;
}

p{
color:#ddd;
margin-bottom:25px;
}

input{
width:100%;
padding:15px;
margin:10px 0;
border:none;
border-radius:12px;
font-size:16px;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:12px;
background:#ff9800;
color:#fff;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#fb8c00;
}

.link{
margin-top:20px;
color:#fff;
}

.link a{
color:#ffd54f;
text-decoration:none;
font-weight:bold;
}

#status{
margin-top:15px;
color:#fff;
font-size:15px;
}
</style>

</head>
<body>

<div class="box">

<div class="logo">🍓</div>

<h2>Fruit Arcade</h2>

<p>Silakan login untuk bermain</p>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">LOGIN</button>

<div class="link">
Belum punya akun?
<a href="register.html">Daftar Sekarang</a>
</div>

<div id="status"></div>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyBeTALsF43ij3aAlZjF1XeBjB1gNtaTb2I",
  authDomain: "game-demo-4db7f.firebaseapp.com",
  projectId: "game-demo-4db7f",
  storageBucket: "game-demo-4db7f.firebasestorage.app",
  messagingSenderId: "405381506143",
  appId: "1:405381506143:web:da63f34a24f01e4f0367ea"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();

function login(){

const email=document.getElementById("email").value.trim();
const password=document.getElementById("password").value.trim();

if(email===""||password===""){
status.innerHTML="Lengkapi email dan password";
return;
}

auth.signInWithEmailAndPassword(email,password)

.then(()=>{

status.innerHTML="Login berhasil...";

setTimeout(()=>{
location.href="game.html";
},1000);

})

.catch(err=>{

status.innerHTML=err.message;

});

}

</script>

</body>
</html>
