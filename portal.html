<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial;background:#0a0a0a;color:#fff}
header{position:sticky;top:0;background:#000;border-bottom:2px solid #d4a500;padding:12px 14px;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:32px;font-weight:700;color:#ffd84d}.btn{background:linear-gradient(#ffe77d,#eab500);color:#000;padding:10px 18px;border-radius:12px;font-weight:bold}

.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;padding:14px}
.card{background:#111;border:2px solid #d4a500;border-radius:18px;overflow:hidden;box-shadow:0 0 18px rgba(255,215,0,.18)}
.cover{height:145px;background-size:cover;background-position:center;position:relative}
.badge{position:absolute;left:10px;top:10px;background:#e10000;color:#fff;padding:5px 10px;border-radius:10px;font-size:12px}
.info{padding:14px}.title{font-size:28px;font-weight:bold;margin-bottom:4px}.sub{color:#bbb;margin-bottom:14px}
.play{display:block;text-decoration:none;text-align:center;background:linear-gradient(#ffe77d,#eab500);color:#000;font-weight:bold;padding:12px;border-radius:12px}
