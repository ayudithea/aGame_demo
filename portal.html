<script>
const firebaseConfig={
apiKey:"AIzaSyBeTALsF43ij3aAlZjF1XeBjB1gNtaTb2I",
authDomain:"game-demo-4db7f.firebaseapp.com",

messagingSenderId:"405381506143",
appId:"1:405381506143:web:da63f34a24f01e4f0367ea"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();    
let player = null;

auth.onAuthStateChanged(async(user)=>{

    if(!user){
        location.replace("index.html");
        return;
    }

    const doc = await db.collection("players")
        .doc(user.uid)
        .get();

    if(!doc.exists){
        alert("Data player tidak ditemukan.");
        await auth.signOut();
        location.replace("index.html");
        return;
    }

    player = doc.data();

   document.getElementById("playerName").textContent =
player.profile.username || player.profile.email.split("@")[0];
 document.getElementById("playerEmail").textContent =
        player.profile.email;

    document.getElementById("coin").textContent =
    Number(player.wallet.coin).toLocaleString("id-ID");

    document.getElementById("diamond").textContent =
        player.wallet.diamond;

    document.getElementById("ticket").textContent =
        player.wallet.ticket;

});
function logout(){
    auth.signOut().then(()=>{
        location.replace("index.html");
    });
}
async function savePlayer(){

    const user = auth.currentUser;

    if(!user){
        console.log("User belum login.");
        return false;
    }

    try{

        await db.collection("players")
            .doc(user.uid)
            .set(player);

        sessionStorage.setItem(
            "player",
            JSON.stringify(player)
        );

        console.log("Data player berhasil disimpan.");

        return true;

    }catch(err){

        console.error("Gagal menyimpan player:", err);

        return false;

    }

}
