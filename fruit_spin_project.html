<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fruit Spin - Project Starter</title>
<style>
body{margin:0;font-family:Arial;background:#eef;text-align:center}
h1{background:#333;color:#fff;padding:14px;margin:0}
#grid{display:grid;grid-template-columns:repeat(5,70px);gap:6px;justify-content:center;margin:20px auto}
.cell{width:70px;height:70px;background:#fff;border:1px solid #999;border-radius:8px;
display:flex;align-items:center;justify-content:center;font-size:40px;transition:.3s}
.break{animation:breakAnim .45s forwards}
@keyframes breakAnim{
0%{transform:scale(1);opacity:1}
40%{transform:scale(1.2) rotate(10deg)}
100%{transform:scale(0);opacity:0}
}
button{padding:10px 22px;font-size:18px}
</style>
</head>
<body>
<h1>🍓 Fruit Spin</h1>
<div id="grid"></div>
<button onclick="alert('Logika lengkap (spin, grup ≥8, gravity, combo, jackpot) akan ditambahkan pada versi penuh.')">SPIN</button>
<script>
const fruits=["🍎","🍓","🍍","🥝","🍇","🥭","🍒","🥥","🍉"];
const grid=document.getElementById("grid");
for(let i=0;i<25;i++){
 const d=document.createElement("div");
 d.className="cell";
 d.textContent=fruits[Math.floor(Math.random()*fruits.length)];
 grid.appendChild(d);
}
</script>
</body>
</html>
